<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mood Cinema{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cinema-polish.css') }}">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page-aurora" aria-hidden="true"></div>
    <div class="page-grain" aria-hidden="true"></div>

    <header class="site-header">
        <div class="container site-header__inner">
            <a href="{{ url_for('main.index') }}" class="brand">
                <span class="brand__mark">MC</span>
                <span class="brand__text">Mood Cinema</span>
            </a>

            <nav class="main-nav">
                <a href="{{ url_for('main.index') }}" class="main-nav__link">Каталог</a>
                <a href="{{ url_for('mood.form') }}" class="main-nav__link main-nav__link--accent">Подбор по настроению</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container site-footer__inner">
            <p>Mood Cinema · учебный каталог фильмов и сериалов</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/cinema-polish.js') }}"></script>
</body>
</html>
